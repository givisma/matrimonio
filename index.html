<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>La Nostra Storia</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(to bottom,#f7f3eb,#ebe5d8);
    font-family:Georgia,serif;
    color:#3a3a3a;
}

.container{
    max-width:800px;
    margin:auto;
    padding:30px 20px 60px;
    text-align:center;
}

.icon{
    font-size:60px;
    margin-top:20px;
}

h1{
    margin-top:15px;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    line-height:1.6;
    font-size:18px;
    margin-bottom:30px;
}

button{
    background:#6f8f72;
    color:white;
    border:none;
    border-radius:999px;
    padding:14px 30px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

#storyArea{
    display:none;
}

.photo{
    width:100%;
    border-radius:20px;
    margin-top:30px;
    opacity:0;
    transition:1.5s;
}

.visible{
    opacity:1;
}

.storyBox{
    margin-top:25px;
    font-size:19px;
    line-height:1.8;
    min-height:120px;
}

.joke{
    margin-top:30px;
    font-size:21px;
    font-style:italic;
}

.thanks{
    margin-top:40px;
    font-size:22px;
}

.heart{
    font-size:32px;
}

</style>
</head>
<body>

<div class="container">

<div class="icon">🏔️</div>

<h1 id="title"></h1>

<div class="subtitle">
Ogni tavolo racconta un piccolo capitolo della nostra storia.<br>
Grazie per essere qui a festeggiare con noi.
</div>

<button id="startButton" onclick="startStory()">
Scopri il ricordo
</button>

<div id="storyArea">

<img id="photo" class="photo">

<div id="story" class="storyBox"></div>

<div id="joke" class="joke"></div>

<div class="thanks">
<div class="heart">❤️</div>
Grazie per essere parte del nostro viaggio
</div>

</div>

</div>

<script>

const tables = {

1:{
title:"Tavolo Monviso",
photo:"foto1.jpg",
story:"Qui abbiamo affrontato una lunga salita che sembrava non finire mai. Tra panorami incredibili e pause tattiche, abbiamo imparato che le avventure più belle sono quelle vissute insieme.",
joke:"Se siete seduti qui significa che ci fidiamo di voi più del GPS."
},

2:{
title:"Tavolo Gran Paradiso",
photo:"foto2.jpg",
story:"Una giornata perfetta tra sentieri, risate e panorami che non dimenticheremo mai.",
joke:"Per fortuna arrivare al buffet sarà più semplice."
},

3:{
title:"Tavolo Dolomiti",
photo:"foto3.jpg",
story:"Una delle escursioni più emozionanti che abbiamo condiviso.",
joke:"Quel giorno nessuno si è perso. Evento storico."
}

};

const params = new URLSearchParams(window.location.search);
const tavolo = params.get("t") || "1";

const data = tables[tavolo] || tables["1"];

document.getElementById("title").innerText = data.title;

function startStory(){

document.getElementById("startButton").style.display="none";

document.getElementById("storyArea").style.display="block";

const photo=document.getElementById("photo");

photo.src=data.photo;

setTimeout(()=>{
    photo.classList.add("visible");
},200);

typeWriter(data.story);

setTimeout(()=>{
    document.getElementById("joke").innerHTML="😄 " + data.joke;
},3500);

}

function typeWriter(text){

let i=0;

const speed=35;

function typing(){

if(i<text.length){

document.getElementById("story").innerHTML += text.charAt(i);

i++;

setTimeout(typing,speed);

}

}

typing();

}

</script>

</body>
</html>
