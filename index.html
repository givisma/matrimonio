<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>La Nostra Storia</title>

<style>

/* =========================
   BASE
========================= */
*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    overflow-x:hidden;
    font-family: Georgia, serif;
}

body{
    background: radial-gradient(circle at top, #f5f1e6, #e7dec9);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* =========================
   ENVELOPE PREMIUM
========================= */
.envelope{
    width:100%;
    max-width:820px;
    position:relative;
    perspective:1600px;
}

/* corpo lettera */
.container{
    background:#f6f1e4;
    border-radius:18px;
    padding:38px 22px 55px;
    text-align:center;

    box-shadow:
        0 30px 60px rgba(0,0,0,0.30),
        0 3px 12px rgba(0,0,0,0.18);

    position:relative;
    transform: translateY(0);
    transition:0.6s ease;
}

/* leggero movimento quando si apre */
.envelope.open .container{
    transform: translateY(6px) scale(1.01);
}

/* =========================
   FLAP PIÙ “IMPORTANTE”
========================= */
.flap{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:260px;

    background: linear-gradient(145deg, #f0e2cc, #ddcaa8);

    border-radius:18px 18px 0 0;

    transform-origin:top;
    transform:rotateX(0deg);

    transition:1.05s cubic-bezier(.2,.8,.2,1);

    z-index:10;

    box-shadow:
        inset 0 -18px 30px rgba(0,0,0,0.12),
        0 12px 25px rgba(0,0,0,0.18);
}

.envelope.open .flap{
    transform:rotateX(175deg);
    opacity:0.95;
}

/* =========================
   SIGILLO DI CERA
========================= */
.seal{
    position:absolute;
    top:185px;
    left:50%;
    transform:translateX(-50%) scale(1);

    width:70px;
    height:70px;

    background: radial-gradient(circle at 30% 30%, #c94b3a, #8b1e1e);

    border-radius:50%;

    box-shadow:
        0 10px 20px rgba(0,0,0,0.25),
        inset 0 6px 10px rgba(255,255,255,0.2);

    z-index:20;

    transition:0.6s ease;
}

/* quando si apre si “rompe” */
.envelope.open .seal{
    transform:translateX(-50%) scale(0.3);
    opacity:0;
}

/* piccolo effetto croce cera */
.seal::after{
    content:"✶";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:rgba(255,255,255,0.85);
    font-size:26px;
}

/* =========================
   CONTENUTO
========================= */
.container::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid rgba(0,0,0,0.08);
    border-radius:14px;
    pointer-events:none;
}

.icon{
    font-size:58px;
}

.subtitle{
    color:#666;
    font-size:17px;
    line-height:1.6;
    margin-bottom:25px;
}

button{
    background:#6f8f72;
    color:white;
    border:none;
    border-radius:999px;
    padding:14px 26px;
    font-size:17px;
    cursor:pointer;
}

/* STORY AREA */
#storyArea{
    display:none;
}

/* POLAROID */
.polaroid{
    background:white;
    padding:14px 14px 40px;
    display:inline-block;
    border-radius:6px;

    box-shadow:0 10px 25px rgba(0,0,0,0.25);

    margin-top:25px;
    width:100%;
    max-width:340px;
}

.photo{
    width:100%;
    display:block;
    border-radius:4px;
    opacity:0;
    transition:1.2s ease;
}

.photo.visible{
    opacity:1;
}

.polaroid-caption{
    margin-top:10px;
    font-size:14px;
    color:#666;
    font-style:italic;
}

/* TEXT */
.storyBox{
    margin-top:25px;
    font-size:18px;
    line-height:1.7;
}

.joke{
    margin-top:18px;
    font-size:20px;
    font-style:italic;
}

.thanks{
    margin-top:30px;
    font-size:20px;
}

/* STAMP */
.stamp{
    position:absolute;
    top:18px;
    right:18px;

    border:3px solid #b23a2f;
    color:#b23a2f;

    padding:9px 12px;
    font-weight:bold;

    transform:rotate(-12deg) scale(0);
    opacity:0;

    transition:0.6s ease;
}

.stamp.show{
    transform:rotate(-12deg) scale(1);
    opacity:1;
}

/* MOBILE */
@media (max-width:768px){

    body{
        align-items:flex-start;
        padding-top:18px;
    }

    .flap{
        height:210px;
    }

    .seal{
        top:150px;
        width:60px;
        height:60px;
    }

    .polaroid{
        max-width:100%;
    }
}

</style>
</head>

<body>

<div class="envelope" id="envelope">

    <div class="flap"></div>

    <!-- SIGILLO -->
    <div class="seal"></div>

    <div class="container">

        <div class="icon">🏔️</div>

        <h1 id="title"></h1>

        <div class="subtitle">
            Ogni tavolo racconta un piccolo capitolo della nostra storia.<br>
            Grazie per essere qui a festeggiare con noi.
        </div>

        <button id="startButton" onclick="startStory()">
            Scopri il ricordo
        </button>

        <div id="storyArea">

            <div id="stamp" class="stamp">APPROVATO</div>

            <div class="polaroid">
                <img id="photo" class="photo">
                <div class="polaroid-caption">Ricordo di viaggio</div>
            </div>

            <div id="story" class="storyBox"></div>

            <div id="joke" class="joke" style="display:none;"></div>

            <div id="thanks" class="thanks" style="display:none;">
                ❤️ Grazie per essere parte del nostro viaggio

                <div id="stage"
                style="
                margin-top:15px;
                display:inline-block;
                padding:10px 16px;
                border:2px solid #b23a2f;
                color:#b23a2f;
                font-weight:bold;
                border-radius:8px;
                transform:rotate(-4deg);
                ">
                </div>
            </div>

        </div>

    </div>

</div>

<script>

const tables = {
1:{
title:"Le Tre Cime di Lavaredo",
photo:"foto1.jpg",

story:"Quattro ore di camminata sotto un sole cocente, chilometri macinati lungo l’anello delle Tre Cime. Un percorso che non concede scorciatoie: solo fatica, respiro corto e silenzi enormi tra le montagne. E poi quel momento in cui ti fermi… e capisci che ne è valsa ogni singola goccia di sudore.",

joke:"Il sole delle Dolomiti non perdona, ma ripaga con panorami che restano dentro.",

stage:"1"
}
};

const params = new URLSearchParams(window.location.search);
const tavolo = params.get("t") || "1";
const data = tables[tavolo];

document.getElementById("title").innerText = data.title;

function startStory(){

    document.getElementById("envelope").classList.add("open");

    document.getElementById("startButton").style.display = "none";
    document.getElementById("storyArea").style.display = "block";

    const photo = document.getElementById("photo");
    photo.src = data.photo;

    setTimeout(()=>{
        photo.classList.add("visible");
    },250);

    typeWriter(data.story, function(){

        setTimeout(()=>{

            const joke = document.getElementById("joke");
            joke.style.display = "block";
            joke.innerHTML = "😄 " + data.joke;

            setTimeout(()=>{

                document.getElementById("thanks").style.display = "block";

                document.getElementById("stage").innerHTML =
                    "🏔️ Ricordo " + data.stage + " di 15";

                document.getElementById("stamp").classList.add("show");

            },700);

        },600);

    });

}

function typeWriter(text, callback){

let i = 0;
const speed = 28;

const el = document.getElementById("story");
el.innerHTML = "";

function typing(){
    if(i < text.length){
        el.innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, speed);
    } else {
        if(callback) callback();
    }
}

typing();

}

</script>

</body>
</html>
