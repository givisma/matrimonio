<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>La Nostra Storia</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(to bottom,#f7f3eb,#ebe5d8);
    font-family:Georgia,serif;
    color:#3a3a3a;
}

.container{
    max-width:800px;
    margin:auto;
    padding:30px 20px 60px;
    text-align:center;
}

.icon{
    font-size:60px;
    margin-top:20px;
}

h1{
    margin-top:15px;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    line-height:1.6;
    font-size:18px;
    margin-bottom:30px;
}

button{
    background:#6f8f72;
    color:white;
    border:none;
    border-radius:999px;
    padding:14px 30px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

#storyArea{
    display:none;
}

.photo{
    width:100%;
    border-radius:20px;
    margin-top:30px;
    opacity:0;
    transition:1.5s;
}

.visible{
    opacity:1;
}

.storyBox{
    margin-top:25px;
    font-size:19px;
    line-height:1.8;
    min-height:120px;
}

.joke{
    margin-top:30px;
    font-size:21px;
    font-style:italic;
}

.thanks{
    margin-top:40px;
    font-size:22px;
}

.heart{
    font-size:32px;
}

</style>
</head>
<body>

<div class="container">

<div class="icon">🏔️</div>

<h1 id="title"></h1>

<div class="subtitle">
Ogni tavolo racconta un piccolo capitolo della nostra storia.<br>
Grazie per essere qui a festeggiare con noi.
</div>

<button id="startButton" onclick="startStory()">
Scopri il ricordo
</button>

<div id="storyArea">

<img id="photo" class="photo">

<div id="story" class="storyBox"></div>

<div id="joke" class="joke" style="display:none;"></div>

<div id="thanks" class="thanks" style="display:none;">
<div class="heart">❤️</div>
Grazie per essere parte del nostro viaggio

<div id="stage"
style="
margin-top:20px;
display:inline-block;
padding:10px 18px;
border:2px solid #b23a2f;
color:#b23a2f;
font-weight:bold;
border-radius:8px;
transform:rotate(-4deg);
font-size:18px;">
</div>
</div>

</div>

</div>

</div>

<script>

const tables = {

1:{
title:"Le Tre Cime di Lavaredo",
photo:"foto1.jpg",
story:"Questa foto è stata scattata durante una delle escursioni più famose che abbiamo affrontato insieme. Per completare il celebre anello delle Tre Cime abbiamo camminato per quasi quattro ore sotto un sole cocente, macinando chilometri tra sentieri, panorami mozzafiato e qualche pausa strategica più del previsto. La fatica non è mancata, ma davanti a queste montagne abbiamo capito che alcuni panorami valgono ogni passo percorso.",
joke:"La montagna insegna tante cose. Quel giorno ci ha insegnato soprattutto che il sole delle Dolomiti non scherza.",
stage:"1"
}

};

const params = new URLSearchParams(window.location.search);
const tavolo = params.get("t") || "1";

const data = tables[tavolo] || tables["1"];

document.getElementById("title").innerText = data.title;

function startStory(){

    document.getElementById("startButton").style.display = "none";

    document.getElementById("storyArea").style.display = "block";

    const photo = document.getElementById("photo");

    photo.src = data.photo;

    setTimeout(()=>{
        photo.classList.add("visible");
    },200);

    typeWriter(data.story, function(){

        setTimeout(()=>{

            const joke = document.getElementById("joke");

            joke.style.display = "block";

            joke.innerHTML = "😄 " + data.joke;

            setTimeout(()=>{

                document.getElementById("thanks").style.display = "block";

                setTimeout(()=>{

                    document.getElementById("stage").innerHTML =
                    "🏔️ Ricordo " + data.stage + " di 15";

                },1000);

            },1200);

        },800);

    });

}

function typeWriter(text, callback){

let i = 0;

const speed = 35;

const storyElement = document.getElementById("story");

storyElement.innerHTML = "";

function typing(){

    if(i < text.length){

        storyElement.innerHTML += text.charAt(i);

        i++;

        setTimeout(typing, speed);

    } else {

        if(callback){
            callback();
        }

    }

}

typing();

}

</script>

</body>
</html>
