<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>La Nostra Storia</title>

<style>

/* =========================
   BASE
========================= */
*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    overflow-x:hidden;
    font-family: Georgia, serif;
}

/* =========================
   BACKGROUND
========================= */
body{
    background: radial-gradient(circle at top, #f5f1e6, #e7dec9);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* =========================
   ENVELOPE WRAPPER
========================= */
.envelope{
    width:100%;
    max-width:820px;
    position:relative;
    perspective:1000px;
}

/* =========================
   FLAP (LETTER OPEN EFFECT)
========================= */
.flap{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:220px;

    background:#e9ddc8;
    border-radius:18px 18px 0 0;

    transform-origin:top;
    transform:rotateX(0deg);

    transition:0.9s ease;
    z-index:5;

    box-shadow: inset 0 -12px 20px rgba(0,0,0,0.12);
}

.envelope.open .flap{
    transform:rotateX(140deg);
    opacity:0.9;
}

/* =========================
   CARTOLINA
========================= */
.container{
    background:#f6f1e4;
    border-radius:18px;
    padding:35px 22px 55px;
    text-align:center;

    box-shadow:
        0 20px 45px rgba(0,0,0,0.25),
        0 2px 10px rgba(0,0,0,0.15);

    position:relative;
}

/* bordo carta */
.container::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid rgba(0,0,0,0.08);
    border-radius:14px;
    pointer-events:none;
}

/* =========================
   UI BASE
========================= */
.icon{
    font-size:58px;
}

.subtitle{
    color:#666;
    font-size:17px;
    line-height:1.6;
    margin-bottom:25px;
}

button{
    background:#6f8f72;
    color:white;
    border:none;
    border-radius:999px;
    padding:14px 26px;
    font-size:17px;
    cursor:pointer;
}

/* =========================
   STORY AREA
========================= */
#storyArea{
    display:none;
}

/* =========================
   POLAROID (RESPONSIVE FIXED)
========================= */
.polaroid{
    background:white;
    padding:14px 14px 40px;
    display:inline-block;
    border-radius:6px;

    box-shadow:0 10px 25px rgba(0,0,0,0.25);

    margin-top:25px;
    transform: rotate(1deg);

    width:100%;
    max-width:340px;
}

.photo{
    width:100%;
    display:block;
    border-radius:4px;
    opacity:0;
    transition:1.2s ease;
}

.photo.visible{
    opacity:1;
}

.polaroid-caption{
    margin-top:10px;
    font-size:14px;
    color:#666;
    font-style:italic;
}

/* =========================
   TEXT
========================= */
.storyBox{
    margin-top:25px;
    font-size:18px;
    line-height:1.7;
}

.joke{
    margin-top:18px;
    font-size:20px;
    font-style:italic;
}

.thanks{
    margin-top:30px;
    font-size:20px;
}

/* =========================
   STAMP
========================= */
.stamp{
    position:absolute;
    top:18px;
    right:18px;

    border:3px solid #b23a2f;
    color:#b23a2f;

    padding:9px 12px;
    font-weight:bold;

    transform:rotate(-12deg) scale(0);
    opacity:0;

    transition:0.6s ease;
}

.stamp.show{
    transform:rotate(-12deg) scale(1);
    opacity:1;
}

/* =========================
   MOBILE PRO (FIX DEFINITIVO)
========================= */
@media (max-width: 768px){

    body{
        align-items:flex-start;
        padding-top:18px;
    }

    .container{
        padding:25px 16px 45px;
    }

    .flap{
        height:180px;
    }

    .icon{
        font-size:48px;
    }

    .subtitle{
        font-size:15px;
    }

    button{
        font-size:16px;
        padding:12px 20px;
    }

    .polaroid{
        max-width:100%;
        transform:none;
    }

    .stamp{
        top:10px;
        right:10px;
        font-size:13px;
        padding:7px 10px;
    }
}

</style>
</head>

<body>

<div class="envelope" id="envelope">

    <div class="flap"></div>

    <div class="container">

        <div class="icon">🏔️</div>

        <h1 id="title"></h1>

        <div class="subtitle">
            Ogni tavolo racconta un piccolo capitolo della nostra storia.<br>
            Grazie per essere qui a festeggiare con noi.
        </div>

        <button id="startButton" onclick="startStory()">
            Scopri il ricordo
        </button>

        <div id="storyArea">

            <div id="stamp" class="stamp">APPROVATO</div>

            <div class="polaroid">
                <img id="photo" class="photo">
                <div class="polaroid-caption">Ricordo di viaggio</div>
            </div>

            <div id="story" class="storyBox"></div>

            <div id="joke" class="joke" style="display:none;"></div>

            <div id="thanks" class="thanks" style="display:none;">
                ❤️ Grazie per essere parte del nostro viaggio

                <div id="stage"
                style="
                margin-top:15px;
                display:inline-block;
                padding:10px 16px;
                border:2px solid #b23a2f;
                color:#b23a2f;
                font-weight:bold;
                border-radius:8px;
                transform:rotate(-4deg);
                ">
                </div>
            </div>

        </div>

    </div>

</div>

<script>

const tables = {
1:{
title:"Le Tre Cime di Lavaredo",
photo:"foto1.jpg",
story:"Questa foto è stata scattata durante una delle escursioni più famose che abbiamo affrontato insieme.",
joke:"Il sole delle Dolomiti non scherza.",
stage:"1"
}
};

const params = new URLSearchParams(window.location.search);
const tavolo = params.get("t") || "1";
const data = tables[tavolo];

document.getElementById("title").innerText = data.title;

function startStory(){

    document.getElementById("envelope").classList.add("open");

    document.getElementById("startButton").style.display = "none";
    document.getElementById("storyArea").style.display = "block";

    const photo = document.getElementById("photo");
    photo.src = data.photo;

    setTimeout(()=>{
        photo.classList.add("visible");
    },200);

    typeWriter(data.story, function(){

        setTimeout(()=>{

            const joke = document.getElementById("joke");
            joke.style.display = "block";
            joke.innerHTML = "😄 " + data.joke;

            setTimeout(()=>{

                document.getElementById("thanks").style.display = "block";

                document.getElementById("stage").innerHTML =
                    "🏔️ Ricordo " + data.stage + " di 15";

                document.getElementById("stamp").classList.add("show");

            },700);

        },600);

    });

}

function typeWriter(text, callback){

let i = 0;
const speed = 28;

const el = document.getElementById("story");
el.innerHTML = "";

function typing(){
    if(i < text.length){
        el.innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, speed);
    } else {
        if(callback) callback();
    }
}

typing();

}

</script>

</body>
</html>
